<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="投資紀錄">
<meta name="theme-color" content="#f2f2f7">
<title>投資紀錄</title>
<style>
/* ===================== CSS VARIABLES — Apple Design System ===================== */
:root {
  --bg-primary: #f5f5f7;
  --bg-secondary: #ffffff;
  --bg-tertiary: #e8e8ed;
  --label-primary: #1d1d1f;
  --label-secondary: rgba(0,0,0,0.56);
  --label-tertiary: rgba(0,0,0,0.36);
  --label-quaternary: rgba(0,0,0,0.18);
  --separator: rgba(0,0,0,0.1);
  --fill-primary: rgba(120,120,128,0.2);
  --fill-secondary: rgba(120,120,128,0.12);
  --blue: #0071e3;
  --blue-dark: #0066cc;
  --green: #34c759;
  --red: #ff3b30;
  --orange: #ff9500;
  --gray: rgba(0,0,0,0.48);
  --gray2: rgba(0,0,0,0.32);
  --gray3: rgba(0,0,0,0.18);
  --gray4: rgba(0,0,0,0.12);
  --gray5: #e8e8ed;
  --gray6: #f5f5f7;
  --font-system: 'SF Pro Display', 'SF Pro Text', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
  --radius-card: 12px;
  --radius-small: 8px;
  --shadow-card: 0 2px 12px rgba(0,0,0,0.08), 0 1px 3px rgba(0,0,0,0.06);
  --safe-top: env(safe-area-inset-top, 44px);
  --safe-bottom: env(safe-area-inset-bottom, 34px);
  --tab-height: 83px;
  --nav-height: 44px;
}

/* ===================== RESET ===================== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { font-size: 17px; }
body {
  font-family: var(--font-system);
  background: var(--bg-primary);
  color: var(--label-primary);
  -webkit-font-smoothing: antialiased;
  overscroll-behavior: none;
  overflow: hidden;
  height: 100dvh;
  position: relative;
}

/* ===================== LAYOUT ===================== */
#app {
  display: flex;
  flex-direction: column;
  height: 100dvh;
  position: relative;
}

/* ===================== PAGE SYSTEM ===================== */
.page-container {
  flex: 1;
  overflow: hidden;
  position: relative;
}

.page {
  position: absolute;
  inset: 0;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  display: none;
  flex-direction: column;
  padding-bottom: calc(var(--tab-height) + 16px);
}

.page.active { display: flex; }

/* iOS scroll behavior */
.page::-webkit-scrollbar { display: none; }

/* ===================== NAVIGATION BAR ===================== */
.nav-bar {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(245,245,247,0.88);
  backdrop-filter: saturate(180%) blur(20px);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  padding-top: var(--safe-top);
  border-bottom: 0.5px solid var(--separator);
}

.nav-bar-inner {
  height: var(--nav-height);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  position: relative;
}

.nav-title {
  font-size: 17px;
  font-weight: 600;
  letter-spacing: -0.374px;
  color: var(--label-primary);
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
}

.nav-btn {
  background: none;
  border: none;
  font-size: 17px;
  color: var(--blue);
  cursor: pointer;
  padding: 4px 2px;
  min-width: 44px;
  display: flex;
  align-items: center;
  letter-spacing: -0.374px;
}

.nav-btn.icon-btn {
  font-size: 26px;
  font-weight: 300;
  line-height: 1;
  justify-content: flex-end;
  color: var(--blue);
}

/* Large Title */
.large-title-section {
  padding: 0 16px 16px;
  background: var(--bg-primary);
}

.large-title {
  font-size: 34px;
  font-weight: 700;
  letter-spacing: -0.374px;
  line-height: 1.1;
  color: var(--label-primary);
}

.large-title-sub {
  font-size: 13px;
  color: var(--label-tertiary);
  letter-spacing: -0.12px;
  margin-top: 4px;
}

/* ===================== TAB BAR ===================== */
.tab-bar {
  background: rgba(245,245,247,0.94);
  backdrop-filter: saturate(180%) blur(20px);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  border-top: 0.5px solid var(--separator);
  padding-bottom: var(--safe-bottom);
  display: flex;
  align-items: stretch;
  height: var(--tab-height);
  flex-shrink: 0;
}

.tab-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  padding-top: 8px;
  gap: 3px;
  transition: opacity 0.15s;
  border: none;
  background: none;
}

.tab-item:active { opacity: 0.6; }

.tab-icon {
  width: 24px;
  height: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--gray);
  transition: color 0.2s;
}

.tab-label {
  font-size: 10px;
  font-weight: 500;
  color: var(--gray);
  letter-spacing: -0.08px;
}

.tab-item.active .tab-label { color: var(--blue); }
.tab-item.active .tab-icon { color: var(--blue); }

/* ===================== SEGMENTED CONTROL ===================== */
.segmented-control {
  display: flex;
  background: var(--fill-primary);
  border-radius: 9px;
  padding: 2px;
  gap: 0;
}

.seg-btn {
  flex: 1;
  padding: 6px 4px;
  font-size: 13px;
  font-weight: 500;
  border: none;
  background: none;
  border-radius: 7px;
  cursor: pointer;
  color: var(--label-primary);
  transition: all 0.2s;
  letter-spacing: -0.1px;
}

.seg-btn.active {
  background: var(--bg-secondary);
  box-shadow: 0 2px 8px rgba(0,0,0,0.12), 0 1px 2px rgba(0,0,0,0.08);
  color: var(--label-primary);
}

/* ===================== CARDS ===================== */
.card {
  background: var(--bg-secondary);
  border-radius: var(--radius-card);
  overflow: hidden;
}

.card-padding { padding: 16px; }

.section {
  padding: 0 16px;
  margin-bottom: 24px;
}


/* ===================== METRIC CARD ===================== */
.metric-card {
  background: var(--bg-secondary);
  border-radius: var(--radius-card);
  padding: 14px 16px;
  box-shadow: var(--shadow-card);
}

.metric-label {
  font-size: 12px;
  font-weight: 400;
  color: var(--label-tertiary);
  letter-spacing: -0.12px;
  margin-bottom: 4px;
}

.metric-value {
  font-size: 28px;
  font-weight: 600;
  letter-spacing: -0.374px;
  line-height: 1.14;
}

.metric-sub {
  font-size: 12px;
  color: var(--label-tertiary);
  letter-spacing: -0.12px;
  margin-top: 2px;
}

.metric-value.positive { color: var(--red); }
.metric-value.negative { color: var(--green); }
.metric-value.neutral { color: var(--label-primary); }

.profit-badge {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  font-size: 12px;
  font-weight: 600;
  padding: 3px 8px;
  border-radius: 980px;
  margin-top: 4px;
  letter-spacing: -0.12px;
}

.profit-badge.positive { background: rgba(255,59,48,0.08); color: var(--red); }
.profit-badge.negative { background: rgba(52,199,89,0.08); color: var(--green); }
.profit-badge.neutral { background: var(--fill-secondary); color: var(--label-secondary); }

/* ===================== STOCK CARD ===================== */
.stock-card {
  background: var(--bg-secondary);
  border-radius: var(--radius-card);
  padding: 16px;
  box-shadow: var(--shadow-card);
}

.stock-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 12px;
}

.stock-name {
  font-size: 17px;
  font-weight: 600;
  letter-spacing: -0.374px;
  color: var(--label-primary);
}

.stock-code {
  font-size: 12px;
  color: var(--label-tertiary);
  letter-spacing: -0.12px;
  margin-top: 1px;
}

.stock-price-area {
  text-align: right;
}

.stock-price {
  font-size: 20px;
  font-weight: 600;
  letter-spacing: -0.374px;
  color: var(--label-primary);
}

.stock-shares-row {
  display: flex;
  justify-content: space-between;
  border-top: 0.5px solid var(--separator);
  padding-top: 12px;
}

.stock-stat {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.stock-stat-label { font-size: 11px; color: var(--label-tertiary); letter-spacing: -0.08px; }
.stock-stat-value { font-size: 13px; font-weight: 600; letter-spacing: -0.12px; color: #414141; }

/* ===================== LIST ROWS ===================== */
.list-group {
  background: var(--bg-secondary);
  border-radius: var(--radius-card);
  overflow: hidden;
  box-shadow: var(--shadow-card);
}

.list-row {
  display: flex;
  align-items: center;
  padding: 12px 16px;
  border-bottom: 0.5px solid var(--separator);
  cursor: pointer;
  transition: background 0.15s;
  min-height: 56px;
}

.list-row:last-child { border-bottom: none; }
.list-row:active { background: var(--fill-secondary); }

.list-row-content {
  flex: 1;
  min-width: 0;
}

.list-row-title {
  font-size: 15px;
  font-weight: 400;
  letter-spacing: -0.224px;
  color: var(--label-primary);
}

.list-row-subtitle {
  font-size: 12px;
  color: var(--label-tertiary);
  letter-spacing: -0.12px;
  margin-top: 2px;
}

.list-row-right {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 2px;
  margin-left: 8px;
}

.list-row-value {
  font-size: 17px;
  font-weight: 700;
  letter-spacing: -0.374px;
}

.list-row-chevron {
  color: var(--gray3);
  font-size: 14px;
  margin-left: 8px;
  flex-shrink: 0;
}

/* ===================== CARDS ===================== */
.card {
  background: var(--bg-secondary);
  border-radius: var(--radius-card);
  overflow: hidden;
  box-shadow: var(--shadow-card);
}

.card-padding { padding: 16px; }

.section {
  padding: 0 16px;
  margin-bottom: 20px;
}

.section-label {
  font-size: 12px;
  font-weight: 400;
  color: var(--label-tertiary);
  text-transform: uppercase;
  letter-spacing: 0.3px;
  padding: 0 4px;
  margin-bottom: 8px;
}

/* ===================== GRID ===================== */
.grid-2 {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

/* ===================== PAGE TOP PADDING ===================== */
.page-content-start { padding-top: 12px; }

/* ===================== TOAST ===================== */
.toast {
  position: fixed;
  bottom: calc(var(--tab-height) + var(--safe-bottom) + 16px);
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: rgba(29,29,31,0.88);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  color: #ffffff;
  padding: 10px 20px;
  border-radius: 980px;
  font-size: 14px;
  font-weight: 400;
  letter-spacing: -0.224px;
  z-index: 9999;
  opacity: 0;
  transition: all 0.3s;
  white-space: nowrap;
  pointer-events: none;
}

.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* ===================== ANIMATION ===================== */
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

.animate-in { animation: fadeInUp 0.3s ease both; }

/* ===================== CONFIRM DIALOG ===================== */
.confirm-overlay {
  position: fixed;
  inset: 0;
  z-index: 2000;
  background: rgba(0,0,0,0.4);
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.confirm-overlay.open { display: flex; }

.confirm-dialog {
  background: var(--bg-secondary);
  border-radius: 14px;
  overflow: hidden;
  width: 100%;
  max-width: 320px;
  transform: scale(0.92);
  opacity: 0;
  transition: all 0.22s cubic-bezier(0.34, 1.56, 0.64, 1);
  box-shadow: 0 8px 32px rgba(0,0,0,0.16);
}

.confirm-overlay.open .confirm-dialog { transform: scale(1); opacity: 1; }

.confirm-header {
  padding: 20px 20px 8px;
  text-align: center;
}

.confirm-title {
  font-size: 17px;
  font-weight: 600;
  letter-spacing: -0.374px;
  margin-bottom: 6px;
}

.confirm-msg {
  font-size: 13px;
  letter-spacing: -0.12px;
  color: var(--label-secondary);
  line-height: 1.47;
}

.confirm-actions {
  border-top: 0.5px solid var(--separator);
  display: flex;
}

.confirm-btn {
  flex: 1;
  padding: 14px;
  border: none;
  background: none;
  font-size: 17px;
  letter-spacing: -0.374px;
  font-family: var(--font-system);
  cursor: pointer;
  transition: background 0.15s;
}

.confirm-btn:active { background: var(--fill-secondary); }
.confirm-btn + .confirm-btn { border-left: 0.5px solid var(--separator); }
.confirm-btn.primary { color: var(--blue); font-weight: 600; }
.confirm-btn.destructive { color: var(--red); font-weight: 600; }

/* Chart stats */
.chart-stats-row {
  display: flex;
  justify-content: space-around;
  padding: 12px 8px 4px;
}

.chart-stat { text-align: center; }

.chart-stat-label {
  font-size: 11px;
  letter-spacing: -0.08px;
  color: var(--label-tertiary);
  margin-bottom: 2px;
}

.chart-stat-value {
  font-size: 12px;
  font-weight: 600;
  letter-spacing: -0.12px;
}

/* ===================== CHART CONTAINER ===================== */
.chart-container {
  background: var(--bg-secondary);
  border-radius: var(--radius-card);
  padding: 16px 8px 8px;
  overflow: hidden;
  box-shadow: var(--shadow-card);
}

.chart-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--label-secondary);
  letter-spacing: -0.12px;
  padding: 0 8px;
  margin-bottom: 8px;
}

.chart-canvas-wrapper {
  position: relative;
  height: 140px;
}

canvas { display: block; width: 100%; height: 100%; }

/* ===================== FORM ===================== */
.form-group {
  background: var(--bg-secondary);
  border-radius: var(--radius-card);
  overflow: hidden;
  box-shadow: var(--shadow-card);
}

.form-row {
  display: flex;
  align-items: center;
  padding: 12px 16px;
  border-bottom: 0.5px solid var(--separator);
  min-height: 48px;
}

.form-row:last-child { border-bottom: none; }

.form-label {
  font-size: 15px;
  letter-spacing: -0.224px;
  min-width: 100px;
  flex-shrink: 0;
  color: var(--label-primary);
}

.form-input {
  flex: 1;
  border: none;
  background: none;
  font-size: 17px;
  font-weight: 700;
  letter-spacing: -0.374px;
  color: var(--label-primary);
  font-family: var(--font-system);
  text-align: right;
  outline: none;
  min-width: 0;
  -webkit-appearance: none;
}

.form-input::placeholder { color: var(--label-quaternary); }

.form-input-full {
  width: 100%;
  border: none;
  background: none;
  font-size: 17px;
  letter-spacing: -0.374px;
  color: var(--label-primary);
  font-family: var(--font-system);
  outline: none;
  -webkit-appearance: none;
  padding: 12px 16px;
  display: block;
}

.form-section-header {
  font-size: 12px;
  font-weight: 400;
  color: var(--label-tertiary);
  text-transform: uppercase;
  letter-spacing: 0.3px;
  padding: 20px 16px 8px;
}

/* ===================== BUTTONS ===================== */
.btn-primary {
  display: block;
  width: 100%;
  padding: 13px 15px;
  background: var(--blue);
  color: #ffffff;
  border: none;
  border-radius: var(--radius-small);
  font-size: 17px;
  font-weight: 400;
  letter-spacing: -0.374px;
  font-family: var(--font-system);
  cursor: pointer;
  text-align: center;
  -webkit-appearance: none;
  transition: opacity 0.15s;
}
.btn-primary:active { opacity: 0.75; }

.btn-destructive {
  background: var(--red);
  color: #ffffff;
  display: block;
  width: 100%;
  padding: 13px 15px;
  border: none;
  border-radius: var(--radius-small);
  font-size: 17px;
  font-weight: 400;
  letter-spacing: -0.374px;
  font-family: var(--font-system);
  cursor: pointer;
  text-align: center;
  -webkit-appearance: none;
  transition: opacity 0.15s;
}
.btn-destructive:active { opacity: 0.75; }

.btn-ghost {
  display: block;
  width: 100%;
  padding: 13px 15px;
  background: var(--fill-primary);
  color: var(--blue);
  border: none;
  border-radius: var(--radius-small);
  font-size: 17px;
  font-weight: 400;
  letter-spacing: -0.374px;
  font-family: var(--font-system);
  cursor: pointer;
  text-align: center;
  -webkit-appearance: none;
  transition: opacity 0.15s;
}
.btn-ghost:active { opacity: 0.75; }

/* ===================== MODAL / SHEET ===================== */
.modal-overlay {
  position: fixed;
  inset: 0;
  z-index: 1000;
  background: rgba(0,0,0,0.36);
  display: none;
  align-items: flex-end;
}
.modal-overlay.open { display: flex; }

.modal-sheet {
  background: var(--bg-primary);
  border-radius: 20px 20px 0 0;
  width: 100%;
  max-height: 96dvh;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding-bottom: var(--safe-bottom);
  transform: translateY(100%);
  transition: transform 0.38s cubic-bezier(0.25, 0.46, 0.45, 0.94);
}
.modal-overlay.open .modal-sheet { transform: translateY(0); }

.modal-handle {
  width: 36px;
  height: 5px;
  background: var(--gray4);
  border-radius: 3px;
  margin: 10px auto 4px;
}

.modal-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 16px 12px;
}

.modal-title {
  font-size: 17px;
  font-weight: 600;
  letter-spacing: -0.374px;
}

/* ===================== DETAIL SHEET ===================== */
.detail-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 16px;
  border-bottom: 0.5px solid var(--separator);
}
.detail-item:last-child { border-bottom: none; }

.detail-item-label {
  font-size: 15px;
  letter-spacing: -0.224px;
  color: var(--label-secondary);
}

.detail-item-value {
  font-size: 15px;
  font-weight: 500;
  letter-spacing: -0.224px;
  color: var(--label-primary);
}

/* ===================== LIVE PREVIEW ===================== */
.live-preview {
  background: var(--bg-secondary);
  border-radius: var(--radius-card);
  padding: 16px;
  margin: 0 16px;
  box-shadow: var(--shadow-card);
}

.live-preview-title {
  font-size: 12px;
  font-weight: 400;
  color: var(--label-tertiary);
  text-transform: uppercase;
  letter-spacing: 0.3px;
  margin-bottom: 12px;
}

.live-preview-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 6px 0;
}

.live-preview-label { font-size: 14px; letter-spacing: -0.224px; color: var(--label-secondary); }
.live-preview-value { font-size: 16px; font-weight: 600; letter-spacing: -0.374px; }

/* ===================== EMPTY STATE ===================== */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 60px 32px;
  text-align: center;
}

.empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.3; }

.empty-title {
  font-size: 21px;
  font-weight: 600;
  letter-spacing: -0.374px;
  margin-bottom: 8px;
  color: var(--label-primary);
}

.empty-subtitle {
  font-size: 15px;
  letter-spacing: -0.224px;
  color: var(--label-tertiary);
  line-height: 1.47;
}

/* ===================== STATUS BADGE ===================== */
.status-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: -0.12px;
  padding: 3px 10px;
  border-radius: 980px;
}
.status-badge.recorded { background: rgba(0,113,227,0.08); color: var(--blue); }
.status-badge.not-recorded { background: rgba(255,149,0,0.1); color: var(--orange); }

/* ===================== SETTINGS ROW VALUES ===================== */
.settings-row-label {
  font-size: 17px;
  letter-spacing: -0.374px;
  flex: 1;
  color: var(--label-primary);
}
.settings-row-value {
  font-size: 17px;
  letter-spacing: -0.374px;
  color: var(--label-tertiary);
  margin-right: 6px;
}

</style>
</head>
<body>

<div id="app">
  <!-- Page Container -->
  <div class="page-container">

    <!-- ========== HOME PAGE ========== -->
    <div class="page active" id="page-home">
      <div class="nav-bar">
        <div class="nav-bar-inner">
          <span></span>
          <span class="nav-title" style="opacity:0">首頁</span>
          <button class="nav-btn icon-btn" onclick="openAddModal()" style="font-size:28px;font-weight:600;">＋</button>
        </div>
      </div>

<script>
/* =====================================================================
   DATA LAYER
   ===================================================================== */

const STORAGE_KEY_RECORDS = 'inv_records';
const STORAGE_KEY_SETTINGS = 'inv_settings';

const DEFAULT_SETTINGS = {
  tsmcShares: 3076,
  etf0050Shares: 68591,
  tsmcAvgCost: 0,
  etf0050AvgCost: 0
};

function loadSettings() {
  try {
    const s = localStorage.getItem(STORAGE_KEY_SETTINGS);
    return s ? { ...DEFAULT_SETTINGS, ...JSON.parse(s) } : { ...DEFAULT_SETTINGS };
  } catch { return { ...DEFAULT_SETTINGS }; }
}

function saveSettings(s) {
  localStorage.setItem(STORAGE_KEY_SETTINGS, JSON.stringify(s));
}

function loadRecords() {
  try {
    const r = localStorage.getItem(STORAGE_KEY_RECORDS);
    return r ? JSON.parse(r) : [];
  } catch { return []; }
}

function saveRecords(records) {
  localStorage.setItem(STORAGE_KEY_RECORDS, JSON.stringify(records));
}

// Compute totalMarketValue for a record
function calcMarketValue(rec) {
  return (rec.tsmcShares * rec.tsmcPrice) + (rec.etf0050Shares * rec.etf0050Price);
}

// Sort records ascending by date
function sortedRecords() {
  return [...loadRecords()].sort((a, b) => a.date.localeCompare(b.date));
}

/* =====================================================================
   DEMO DATA
   ===================================================================== */

function seedDemoData() {
  // 不塞假資料，讓使用者自行新增第一筆
}

/* =====================================================================
   UTILITIES
   ===================================================================== */

function fmtMoney(n, decimals = 0) {
  if (n == null || isNaN(n)) return '—';
  return (n >= 0 ? '' : '-') + '$' + Math.abs(n).toLocaleString('zh-TW', {
    minimumFractionDigits: decimals,
    maximumFractionDigits: decimals
  });
}

function fmtProfit(n) {
  if (n == null || isNaN(n)) return '—';
  const sign = n > 0 ? '▲' : n < 0 ? '▼' : '－';
  return `<span style="font-size:0.75em;">${sign}</span> ${fmtMoney(Math.abs(n))}`;
}

function profitClass(n) {
  if (!n || n === 0) return 'neutral';
  return n > 0 ? 'positive' : 'negative';
}

function todayStr() {
  return new Date().toISOString().slice(0, 10);
}

function fmtDate(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  return `${d.getMonth() + 1}/${d.getDate()}`;
}

function fmtDateFull(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  return `${d.getFullYear()}年${d.getMonth() + 1}月${d.getDate()}日`;
}

function weekLabel(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  const day = d.getDay();
  const diff = d.getDate() - day + (day === 0 ? -6 : 1);
  const mon = new Date(d);
  mon.setDate(diff);
  const sun = new Date(mon);
  sun.setDate(sun.getDate() + 6);
  return `${mon.getMonth() + 1}/${mon.getDate()} – ${sun.getMonth() + 1}/${sun.getDate()}`;
}

function monthLabel(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  return `${d.getFullYear()}年${d.getMonth() + 1}月`;
}

function yearLabel(dateStr) {
  return dateStr.slice(0, 4) + '年';
}

function weekKey(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  const day = d.getDay();
  const diff = d.getDate() - day + (day === 0 ? -6 : 1);
  const mon = new Date(d);
  mon.setDate(diff);
  return mon.toISOString().slice(0, 10);
}

function monthKey(dateStr) { return dateStr.slice(0, 7); }
function yearKey(dateStr) { return dateStr.slice(0, 4); }

/* =====================================================================
   PROFIT CALCULATIONS
   ===================================================================== */

function getFirstRecordOfPeriod(records, date, period) {
  const d = new Date(date + 'T00:00:00');
  let start;
  if (period === 'week') {
    const day = d.getDay();
    const diff = d.getDate() - day + (day === 0 ? -6 : 1);
    start = new Date(d); start.setDate(diff);
  } else if (period === 'month') {
    start = new Date(d.getFullYear(), d.getMonth(), 1);
  } else if (period === 'year') {
    start = new Date(d.getFullYear(), 0, 1);
  }
  const startStr = start.toISOString().slice(0, 10);
  const before = records.filter(r => r.date < startStr);
  return before.length > 0 ? before[before.length - 1] : null;
}

function calcProfits(records) {
  // records sorted ascending
  const sorted = [...records].sort((a, b) => a.date.localeCompare(b.date));
  return sorted.map((rec, idx) => {
    const mv = rec.totalMarketValue;
    const prev = idx > 0 ? sorted[idx - 1] : null;
    const dailyProfit = prev ? mv - prev.totalMarketValue : 0;

    const weekStart = getFirstRecordOfPeriod(sorted, rec.date, 'week');
    const weeklyProfit = weekStart ? mv - weekStart.totalMarketValue : (prev ? mv - sorted[0].totalMarketValue : 0);

    const monthStart = getFirstRecordOfPeriod(sorted, rec.date, 'month');
    const monthlyProfit = monthStart ? mv - monthStart.totalMarketValue : (prev ? mv - sorted[0].totalMarketValue : 0);

    const yearStart = getFirstRecordOfPeriod(sorted, rec.date, 'year');
    const yearlyProfit = yearStart ? mv - yearStart.totalMarketValue : (prev ? mv - sorted[0].totalMarketValue : 0);

    return { ...rec, dailyProfit, weeklyProfit, monthlyProfit, yearlyProfit };
  });
}

/* =====================================================================
   TAB NAVIGATION
   ===================================================================== */

let currentTab = 'home';

function switchTab(tab) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
  document.getElementById('page-' + tab).classList.add('active');
  document.getElementById('tab-' + tab).classList.add('active');
  currentTab = tab;

  if (tab === 'home') renderHome();
  if (tab === 'history') renderHistory();
  if (tab === 'charts') renderCharts();
  if (tab === 'settings') renderSettings();
}

/* =====================================================================
   HOME PAGE
   ===================================================================== */

let homePeriod = 'today';

function setHomePeriod(period) {
  homePeriod = period;
  document.querySelectorAll('#home-seg .seg-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.period === period);
  });
  renderHome();
}

function renderHome() {
  const records = sortedRecords();
  const enriched = calcProfits(records);
  const today = todayStr();
  const latest = enriched.length > 0 ? enriched[enriched.length - 1] : null;
  const settings = loadSettings();

  // Date subtitle
  const dateEl = document.getElementById('home-date-sub');
  const now = new Date();
  dateEl.textContent = `${now.getFullYear()}年${now.getMonth() + 1}月${now.getDate()}日`;

  // Recorded badge
  const badgeEl = document.getElementById('home-recorded-badge');
  const todayRecorded = records.some(r => r.date === today);
  badgeEl.innerHTML = `<span class="status-badge ${todayRecorded ? 'recorded' : 'not-recorded'}">
    ${todayRecorded ? '✓ 今日已記錄' : '• 今日未記錄'}
  </span>`;

  // Empty state
  const hasData = enriched.length > 0;

  if (!hasData) {
    document.getElementById('home-total-value').textContent = '—';
    document.getElementById('home-profit-badge').innerHTML = '';
    ['today','week','month','year'].forEach(p => {
      const el = document.getElementById('val-' + p);
      el.textContent = '—';
      el.style.color = '';
    });
    document.getElementById('stock-tsmc').innerHTML = stockCardEmpty('台積電', '2330');
    document.getElementById('stock-0050').innerHTML = stockCardEmpty('元大台灣50', '0050');
    return;
  }

  // Get period profit
  let periodProfit = 0;
  if (homePeriod === 'today') periodProfit = latest.dailyProfit;
  else if (homePeriod === 'week') periodProfit = latest.weeklyProfit;
  else if (homePeriod === 'month') periodProfit = latest.monthlyProfit;
  else if (homePeriod === 'year') periodProfit = latest.yearlyProfit;

  // Total value
  document.getElementById('home-total-value').textContent = fmtMoney(latest.totalMarketValue);
  document.getElementById('home-total-value').className = 'metric-value neutral';

  // Profit badge
  const badgeClass = profitClass(periodProfit);
  document.getElementById('home-profit-badge').innerHTML =
    `<div class="profit-badge ${badgeClass}">${fmtProfit(periodProfit)}</div>`;

  // 4 metric cards
  const todayRec = enriched.find(r => r.date === today) || latest;
  const vals = {
    today: todayRec.dailyProfit,
    week: todayRec.weeklyProfit,
    month: todayRec.monthlyProfit,
    year: todayRec.yearlyProfit
  };
  ['today','week','month','year'].forEach(p => {
    const el = document.getElementById('val-' + p);
    const v = vals[p];
    el.innerHTML = fmtProfit(v);
    const cls = profitClass(v);
    el.style.color = cls === 'positive' ? 'var(--red)' : cls === 'negative' ? 'var(--green)' : 'var(--label-primary)';
  });

  // Stock cards — 顯示可輸入價格版本
  const prevRec = enriched.length > 1 ? enriched[enriched.length - 2] : null;
  const tsmcCostBasis = settings.tsmcAvgCost > 0 ? settings.tsmcAvgCost * latest.tsmcShares : null;
  const etfCostBasis = settings.etf0050AvgCost > 0 ? settings.etf0050AvgCost * latest.etf0050Shares : null;

  document.getElementById('stock-tsmc').innerHTML = buildEditableStockCard(
    'tsmc', '台積電', '2330', latest.tsmcPrice, latest.tsmcShares, prevRec ? prevRec.tsmcPrice : null, tsmcCostBasis
  );
  document.getElementById('stock-0050').innerHTML = buildEditableStockCard(
    'etf', '元大台灣50', '0050', latest.etf0050Price, latest.etf0050Shares, prevRec ? prevRec.etf0050Price : null, etfCostBasis
  );
}

function buildEditableStockCard(id, name, code, price, shares, prevPrice, costBasis) {
  const value = shares * price;
  const diff = prevPrice != null ? (price - prevPrice) * shares : 0;
  const cls = profitClass(diff);
  const costUnrealized = costBasis != null ? value - costBasis : null;
  return `
    <div class="stock-header">
      <div>
        <div style="display:inline-block;background:#414141;color:#fff;font-size:15px;font-weight:600;letter-spacing:-0.224px;padding:5px 14px;border-radius:980px;margin-bottom:4px;">${name}</div>
        <div class="stock-code">${code}</div>
      </div>
      <div class="stock-price-area">
        <input
          id="price-input-${id}"
          type="number"
          inputmode="decimal"
          step="0.1"
          value="${price}"
          style="border:none;background:none;font-size:20px;font-weight:700;letter-spacing:-0.3px;color:var(--label-primary);font-family:var(--font-system);text-align:right;width:110px;outline:none;-webkit-appearance:none;"
          oninput="onPriceInput()"
        >

function onPriceInput() {
  const records = sortedRecords();
  const enriched = calcProfits(records);
  if (enriched.length === 0) return;
  const latest = enriched[enriched.length - 1];
  const prevRec = enriched.length > 1 ? enriched[enriched.length - 2] : null;
  const settings = loadSettings();

  const tsmcInput = document.getElementById('price-input-tsmc');
  const etfInput = document.getElementById('price-input-etf');
  if (!tsmcInput || !etfInput) return;

  const tsmcPrice = parseFloat(tsmcInput.value) || latest.tsmcPrice;
  const etfPrice = parseFloat(etfInput.value) || latest.etf0050Price;
  const tsmcShares = latest.tsmcShares;
  const etfShares = latest.etf0050Shares;

  const tsmcValue = tsmcShares * tsmcPrice;
  const etfValue = etfShares * etfPrice;
  const totalMV = tsmcValue + etfValue;

  // Update market value displays
  const tvTsmc = document.getElementById('value-display-tsmc');
  const tvEtf = document.getElementById('value-display-etf');
  if (tvTsmc) tvTsmc.textContent = fmtMoney(tsmcValue);
  if (tvEtf) tvEtf.textContent = fmtMoney(etfValue);

  // Update diff badges
  if (prevRec) {
    const tsmcDiff = (tsmcPrice - prevRec.tsmcPrice) * tsmcShares;
    const etfDiff = (etfPrice - prevRec.etf0050Price) * etfShares;
    const tsmcBadge = document.getElementById('diff-badge-tsmc');
    const etfBadge = document.getElementById('diff-badge-etf');
    if (tsmcBadge) {
      tsmcBadge.innerHTML = fmtProfit(tsmcDiff);
      tsmcBadge.className = 'profit-badge ' + profitClass(tsmcDiff);
    }
    if (etfBadge) {
      etfBadge.innerHTML = fmtProfit(etfDiff);
      etfBadge.className = 'profit-badge ' + profitClass(etfDiff);
    }
  }

  // Update unrealized if cost set
  const tsmcCostBasis = settings.tsmcAvgCost > 0 ? settings.tsmcAvgCost * tsmcShares : null;
  const etfCostBasis = settings.etf0050AvgCost > 0 ? settings.etf0050AvgCost * etfShares : null;
  if (tsmcCostBasis != null) {
    const el = document.getElementById('unrealized-tsmc');
    if (el) { const u = tsmcValue - tsmcCostBasis; el.innerHTML = fmtProfit(u); el.className = 'stock-stat-value ' + profitClass(u); }
  }
  if (etfCostBasis != null) {
    const el = document.getElementById('unrealized-etf');
    if (el) { const u = etfValue - etfCostBasis; el.innerHTML = fmtProfit(u); el.className = 'stock-stat-value ' + profitClass(u); }
  }

  // Update total market value
  document.getElementById('home-total-value').textContent = fmtMoney(totalMV);

  // Recalculate profit summary against saved records
  const today = todayStr();
  const todayRec = enriched.find(r => r.date === today) || latest;

  // 今日損益：與前日最後市值比
  const dailyBase = prevRec ? prevRec.totalMarketValue : totalMV;
  const dailyProfit = totalMV - dailyBase;

  // 本週、本月、本年：找各期間起始點
  const allRecs = enriched;
  function getPeriodBase(period) {
    const d = new Date(today + 'T00:00:00');
    let start;
    if (period === 'week') {
      const day = d.getDay();
      const diff = d.getDate() - day + (day === 0 ? -6 : 1);
      start = new Date(d); start.setDate(diff);
    } else if (period === 'month') {
      start = new Date(d.getFullYear(), d.getMonth(), 1);
    } else if (period === 'year') {
      start = new Date(d.getFullYear(), 0, 1);
    }
    const startStr = start.toISOString().slice(0, 10);
    const before = allRecs.filter(r => r.date < startStr);
    return before.length > 0 ? before[before.length - 1].totalMarketValue : allRecs[0].totalMarketValue;
  }

  const profits = {
    today: dailyProfit,
    week: totalMV - getPeriodBase('week'),
    month: totalMV - getPeriodBase('month'),
    year: totalMV - getPeriodBase('year')
  };

  ['today','week','month','year'].forEach(p => {
    const el = document.getElementById('val-' + p);
    if (!el) return;
    const v = profits[p];
    el.innerHTML = fmtProfit(v);
    const cls = profitClass(v);
    el.style.color = cls === 'positive' ? 'var(--red)' : cls === 'negative' ? 'var(--green)' : 'var(--label-primary)';
  });

  // Update profit badge on total
  const overallCls = profitClass(dailyProfit);
  document.getElementById('home-profit-badge').innerHTML =
    `<div class="profit-badge ${overallCls}">${fmtProfit(dailyProfit)}</div>`;
}

let historyPeriod = 'day';

function setHistoryPeriod(period) {

function renderHistory() {
  const records = sortedRecords().reverse(); // Newest first
  const enriched = calcProfits([...records].reverse()).reverse();
  const wrapper = document.getElementById('history-list-wrapper');

  if (enriched.length === 0) {
    wrapper.innerHTML = `<div class="empty-state">
      <div class="empty-icon">📋</div>
      <div class="empty-title">尚無紀錄</div>
      <div class="empty-subtitle">今天還沒有記錄<br>點首頁右上角「＋」新增今日資料</div>
    </div>`;
    return;
  }

  if (historyPeriod === 'day') {
    renderHistoryDay(enriched, wrapper);
  } else {
    renderHistoryGrouped(enriched, wrapper);
  }
}

function renderHistoryDay(enriched, wrapper) {
  let html = '<div class="list-group">';
  enriched.forEach((rec) => {
    const profitCls = profitClass(rec.dailyProfit);
    html += `
      <div class="list-row" onclick="showDetail('${rec.date}')">
        <div class="list-row-content">
          <div class="list-row-title">${fmtDateFull(rec.date)}</div>
          <div class="list-row-subtitle">$${rec.tsmcPrice.toLocaleString()} · $${rec.etf0050Price.toLocaleString()}</div>
        </div>
        <div class="list-row-right">
          <div class="list-row-value">${fmtMoney(rec.totalMarketValue)}</div>
          <span class="profit-badge ${profitCls}" style="font-size:11px;">${fmtProfit(rec.dailyProfit)}</span>
        </div>
        <span class="list-row-chevron">›</span>
      </div>
    `;
  });
  html += '</div>';
  wrapper.innerHTML = html;
}

function renderHistoryGrouped(enriched, wrapper) {
  // Group by week/month/year
  const groups = {};
  const getKey = historyPeriod === 'week' ? weekKey
    : historyPeriod === 'month' ? monthKey : yearKey;
  const getLabel = historyPeriod === 'week' ? weekLabel
    : historyPeriod === 'month' ? monthLabel : yearLabel;

  enriched.forEach(rec => {
    const k = getKey(rec.date);
    if (!groups[k]) groups[k] = { key: k, label: getLabel(rec.date), records: [] };
    groups[k].records.push(rec);
  });

  const sortedKeys = Object.keys(groups).sort((a, b) => b.localeCompare(a));

  let html = '';
  sortedKeys.forEach(k => {
    const g = groups[k];
    const latest = g.records[0]; // Already newest-first
    const earliest = g.records[g.records.length - 1];
    const profit = latest.totalMarketValue - earliest.totalMarketValue;
    // Actually get period profit
    let periodProfit = 0;
    if (historyPeriod === 'week') periodProfit = g.records[0].weeklyProfit;
    else if (historyPeriod === 'month') periodProfit = g.records[0].monthlyProfit;
    else periodProfit = g.records[0].yearlyProfit;

    const cls = profitClass(periodProfit);
    html += `<div class="section-label">${g.label}</div>
    <div class="list-group" style="margin-bottom:16px;">
      <div class="list-row" style="cursor:default;">
        <div class="list-row-content">
          <div class="list-row-title">${g.records.length} 筆紀錄</div>
          <div class="list-row-subtitle">最新：$${latest.tsmcPrice.toLocaleString()} / $${latest.etf0050Price.toLocaleString()}</div>
        </div>
        <div class="list-row-right">
          <div class="list-row-value">${fmtMoney(latest.totalMarketValue)}</div>
          <span class="profit-badge ${cls}" style="font-size:11px;">${fmtProfit(periodProfit)}</span>
        </div>
      </div>
    `;
    g.records.forEach(rec => {
      const dcls = profitClass(rec.dailyProfit);
      html += `
        <div class="list-row" onclick="showDetail('${rec.date}')" style="padding-left:32px;">
          <div class="list-row-content">
            <div class="list-row-title" style="font-size:15px;">${fmtDateFull(rec.date)}</div>
          </div>
          <div class="list-row-right">
            <span class="profit-badge ${dcls}" style="font-size:11px;">${fmtProfit(rec.dailyProfit)}</span>
          </div>
          <span class="list-row-chevron">›</span>
        </div>
      `;
    });
    html += '</div>';
  });

  wrapper.innerHTML = html || '<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-title">無資料</div></div>';
}

        <span class="form-label">價格</span>

function applyDefaultShares() {
  const s = loadSettings();
  document.getElementById('f-tsmc-shares').value = s.tsmcShares;
  document.getElementById('f-etf-shares').value = s.etf0050Shares;
  updateLivePreview();
}

function applyYesterdayShares() {
  const records = sortedRecords();
  if (records.length === 0) return;
  const yesterday = records[records.length - 1];
  document.getElementById('f-tsmc-shares').value = yesterday.tsmcShares;
  document.getElementById('f-etf-shares').value = yesterday.etf0050Shares;
  updateLivePreview();
}

function updateLivePreview() {
  const tsmcShares = parseFloat(document.getElementById('f-tsmc-shares').value) || 0;
  const tsmcPrice = parseFloat(document.getElementById('f-tsmc-price').value) || 0;
  const etfShares = parseFloat(document.getElementById('f-etf-shares').value) || 0;
  const etfPrice = parseFloat(document.getElementById('f-etf-price').value) || 0;

  if (tsmcPrice === 0 && etfPrice === 0) {
    document.getElementById('lp-total').textContent = '—';
    document.getElementById('lp-diff').textContent = '—';
    return;
  }

  const total = (tsmcShares * tsmcPrice) + (etfShares * etfPrice);
  document.getElementById('lp-total').textContent = fmtMoney(total);

  // Compare with previous record
  const records = sortedRecords();
  const dateStr = document.getElementById('f-date') ? document.getElementById('f-date').value : '';
  const prevRecords = records.filter(r => r.date < dateStr);
  const prev = prevRecords.length > 0 ? prevRecords[prevRecords.length - 1] : (records.length > 0 ? records[records.length - 1] : null);
  if (prev && total > 0) {
    const diff = total - prev.totalMarketValue;
    const el = document.getElementById('lp-diff');
    el.innerHTML = fmtProfit(diff);
    el.className = 'live-preview-value ' + profitClass(diff);
  } else {
    document.getElementById('lp-diff').textContent = '—';
  }
}

function saveRecord() {
  const date = document.getElementById('f-date').value;
  const tsmcShares = parseInt(document.getElementById('f-tsmc-shares').value) || 0;
  const tsmcPrice = parseFloat(document.getElementById('f-tsmc-price').value) || 0;
  const etfShares = parseInt(document.getElementById('f-etf-shares').value) || 0;
  const etfPrice = parseFloat(document.getElementById('f-etf-price').value) || 0;
  const note = document.getElementById('f-note').value.trim();

  if (!date) { showToast('請選擇日期'); return; }
  if (tsmcPrice <= 0 || etfPrice <= 0) { showToast('請輸入股票價格'); return; }
  if (tsmcShares <= 0 || etfShares <= 0) { showToast('請輸入股數'); return; }

  const totalMarketValue = (tsmcShares * tsmcPrice) + (etfShares * etfPrice);
  const record = {
    id: date,
    date,
    tsmcShares,
    tsmcPrice,
    etf0050Shares: etfShares,
    etf0050Price: etfPrice,
    totalMarketValue,
    note
  };

  let records = loadRecords();
  const existing = records.findIndex(r => r.date === date);
  if (existing >= 0) {
    records[existing] = record;
  } else {
    records.push(record);
  }
  saveRecords(records);
  closeAddModal();
  showToast(editingDate ? '紀錄已更新 ✓' : '紀錄已儲存 ✓');

  // Refresh current tab
  setTimeout(() => {
    if (currentTab === 'home') renderHome();
    else if (currentTab === 'history') renderHistory();
    else if (currentTab === 'charts') renderCharts();
    renderHome(); // always update home data
  }, 100);
}

function closeAddModal() {
  closeModal('add-modal');
  editingDate = null;
}

let pendingDeleteDate = null;
let confirmCallback = null;

function confirmDelete(dateStr) {
  pendingDeleteDate = dateStr;
  document.getElementById('confirm-title').textContent = '確認刪除';
  document.getElementById('confirm-msg').textContent = `確定要刪除 ${fmtDateFull(dateStr)} 的紀錄嗎？此操作無法復原。`;
  document.getElementById('confirm-ok-btn').textContent = '刪除';
  document.getElementById('confirm-ok-btn').className = 'confirm-btn destructive';
  confirmCallback = () => {
    let records = loadRecords();
    records = records.filter(r => r.date !== pendingDeleteDate);
    saveRecords(records);
    closeModal('detail-modal');
    showToast('紀錄已刪除');
    setTimeout(() => {
      renderHome();
      if (currentTab === 'history') renderHistory();
      if (currentTab === 'charts') renderCharts();
    }, 100);
  };
  openConfirm();
}

function openConfirm() {
  document.getElementById('confirm-overlay').classList.add('open');
}

function confirmCancel() {
  document.getElementById('confirm-overlay').classList.remove('open');
  confirmCallback = null;
}

function confirmOk() {
  document.getElementById('confirm-overlay').classList.remove('open');
  if (confirmCallback) { confirmCallback(); confirmCallback = null; }
}

function renderCharts() {
  const records = sortedRecords();
  const enriched = calcProfits(records);

  const chartsEmpty = document.getElementById('charts-empty');
  if (enriched.length < 2) {
    chartsEmpty.style.display = 'block';
    return;
  }
  chartsEmpty.style.display = 'none';

  let data = enriched;
  if (chartRange > 0) {
    data = enriched.slice(-chartRange);
  }

  const baseVal = enriched[0].totalMarketValue;
  const profitData = data.map(r => r.totalMarketValue - baseVal);
  const valueData = data.map(r => r.totalMarketValue);

  // Value chart
  renderLineChart('chart-value-main', data, r => r.totalMarketValue, '#0071e3', true);
  const vals = valueData;
  const maxV = Math.max(...vals), minV = Math.min(...vals), curV = vals[vals.length - 1];
  document.getElementById('chart-value-stats').innerHTML = buildChartStats([
    ['目前值', fmtMoney(curV), 'neutral'],
    ['區間最高', fmtMoney(maxV), 'positive'],
    ['區間最低', fmtMoney(minV), 'negative'],
    ['區間變化', fmtProfit(curV - vals[0]), profitClass(curV - vals[0])]
  ]);

  // Profit chart — Claude 橘色
  renderLineChart('chart-profit-main', data, r => r.totalMarketValue - baseVal, '#FE9E9E', true);
  const profs = profitData;
  const maxP = Math.max(...profs), minP = Math.min(...profs), curP = profs[profs.length - 1];
  document.getElementById('chart-profit-stats').innerHTML = buildChartStats([
    ['目前累積', fmtProfit(curP), profitClass(curP)],
    ['區間最高', fmtProfit(maxP), profitClass(maxP)],
    ['區間最低', fmtProfit(minP), profitClass(minP)],
    ['區間變化', fmtProfit(curP - profs[0]), profitClass(curP - profs[0])]
  ]);
}

function buildChartStats(items) {
  return items.map(([label, value, cls]) => `
    <div class="chart-stat">
      <div class="chart-stat-label">${label}</div>
      <div class="chart-stat-value ${cls}">${value}</div>
    </div>
  `).join('');
}

/* =====================================================================
   LINE CHART (Vanilla Canvas)
   ===================================================================== */

function renderLineChart(canvasId, records, valueGetter, color, showLabels = false) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;

  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.parentElement.getBoundingClientRect();
  const W = rect.width || 300;
  const H = rect.height || 140;

  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';

  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  if (!records || records.length < 2) {
    ctx.fillStyle = '#8e8e93';
    ctx.font = '13px -apple-system';
    ctx.textAlign = 'center';
    ctx.fillText('資料不足', W / 2, H / 2);
    return;
  }

  const values = records.map(valueGetter);
  const minVal = Math.min(...values);
  const maxVal = Math.max(...values);
  const range = maxVal - minVal || 1;

  const padL = 8;
  const padR = 8;
  const padT = 12;
  const padB = showLabels ? 22 : 16;
  const chartW = W - padL - padR;
  const chartH = H - padT - padB;

  const xStep = chartW / (values.length - 1);

  const getX = i => padL + i * xStep;
  const getY = v => padT + chartH - ((v - minVal) / range) * chartH;

  // Gradient fill
  const grad = ctx.createLinearGradient(0, padT, 0, padT + chartH);
  grad.addColorStop(0, color + '33');
  grad.addColorStop(1, color + '00');

  ctx.beginPath();
  ctx.moveTo(getX(0), getY(values[0]));
  for (let i = 1; i < values.length; i++) {
    // Smooth curve
    const x0 = getX(i - 1), y0 = getY(values[i - 1]);
    const x1 = getX(i), y1 = getY(values[i]);
    const cpx = (x0 + x1) / 2;
    ctx.bezierCurveTo(cpx, y0, cpx, y1, x1, y1);
  }
  ctx.lineTo(getX(values.length - 1), padT + chartH);
  ctx.lineTo(getX(0), padT + chartH);
  ctx.closePath();
  ctx.fillStyle = grad;
  ctx.fill();

  // Line
  ctx.beginPath();
  ctx.moveTo(getX(0), getY(values[0]));
  for (let i = 1; i < values.length; i++) {
    const x0 = getX(i - 1), y0 = getY(values[i - 1]);
    const x1 = getX(i), y1 = getY(values[i]);
    const cpx = (x0 + x1) / 2;
    ctx.bezierCurveTo(cpx, y0, cpx, y1, x1, y1);
  }
  ctx.strokeStyle = color;
  ctx.lineWidth = 2;
  ctx.lineJoin = 'round';
  ctx.stroke();

  // Last point dot
  const lastX = getX(values.length - 1);
  const lastY = getY(values[values.length - 1]);
  ctx.beginPath();
  ctx.arc(lastX, lastY, 4, 0, Math.PI * 2);
  ctx.fillStyle = color;
  ctx.fill();
  ctx.beginPath();
  ctx.arc(lastX, lastY, 2, 0, Math.PI * 2);
  ctx.fillStyle = '#fff';
  ctx.fill();

  // X labels
  if (showLabels && records.length > 0) {
    ctx.fillStyle = 'rgba(0,0,0,0.36)';
    ctx.font = `9px -apple-system`;
    const labelY = H - 4;

    // First label — left-align to avoid left clip
    ctx.textAlign = 'left';
    ctx.fillText(fmtDate(records[0].date), padL, labelY);

    // Last label — right-align to avoid right clip
    ctx.textAlign = 'right';
    ctx.fillText(fmtDate(records[records.length - 1].date), W - padR, labelY);

    // Middle labels centered
    if (records.length > 2) {
      ctx.textAlign = 'center';
      const step = Math.ceil(records.length / 4);
      for (let i = step; i < records.length - 1; i += step) {
        ctx.fillText(fmtDate(records[i].date), getX(i), labelY);
      }
    }
  }
}

    <div class="form-section-header">持股設定</div>
    <div class="form-group" style="margin:0 16px;">
      <div class="form-row">
        <span class="form-label">台積電股數</span>
        <input class="form-input" type="number" id="s-tsmc-shares" value="${s.tsmcShares}" inputmode="numeric" onchange="saveSettingField('tsmcShares','s-tsmc-shares')">
      </div>
      <div class="form-row">
        <span class="form-label">0050 股數</span>
        <input class="form-input" type="number" id="s-etf-shares" value="${s.etf0050Shares}" inputmode="numeric" onchange="saveSettingField('etf0050Shares','s-etf-shares')">
      </div>
    </div>

    <div class="form-section-header">成本設定（選填）</div>
    <div class="form-group" style="margin:0 16px;">
      <div class="form-row">
        <span class="form-label">台積電成本</span>
        <input class="form-input" type="number" id="s-tsmc-cost" value="${s.tsmcAvgCost || ''}" placeholder="未設定" inputmode="decimal" step="0.1" onchange="saveSettingField('tsmcAvgCost','s-tsmc-cost')">
      </div>
      <div class="form-row">
        <span class="form-label">0050 成本</span>
        <input class="form-input" type="number" id="s-etf-cost" value="${s.etf0050AvgCost || ''}" placeholder="未設定" inputmode="decimal" step="0.01" onchange="saveSettingField('etf0050AvgCost','s-etf-cost')">
      </div>
    </div>

    <div class="form-section-header">資料管理</div>
    <div class="list-group" style="margin:0 16px;">
      <div class="list-row" onclick="exportData()">
        <div class="list-row-content"><div class="list-row-title">匯出 JSON</div></div>
        <span class="list-row-chevron">›</span>
      </div>
      <div class="list-row" onclick="importData()">
        <div class="list-row-content"><div class="list-row-title">匯入 JSON</div></div>
        <span class="list-row-chevron">›</span>
      </div>
      <div class="list-row" onclick="clearAllData()">
        <div class="list-row-content"><div class="list-row-title" style="color:var(--red);">清除所有資料</div></div>
        <span class="list-row-chevron" style="color:var(--red);">›</span>
      </div>
    </div>

    <div style="padding:24px 16px 16px;text-align:center;font-size:12px;letter-spacing:-0.12px;color:var(--label-quaternary);">
      資料僅存於本機，不會上傳雲端
    </div>
  `;
  document.getElementById('settings-content').innerHTML = html;
}

function saveSettingField(key, inputId) {
  const raw = document.getElementById(inputId).value.trim();
  const n = parseFloat(raw.replace(/,/g, ''));
  if (raw === '' && (key === 'tsmcAvgCost' || key === 'etf0050AvgCost')) {
    const s = loadSettings(); s[key] = 0; saveSettings(s);
    showToast('已清除成本設定'); return;
  }
  if (isNaN(n) || n < 0) { showToast('請輸入有效數字'); return; }
  const s = loadSettings(); s[key] = n; saveSettings(s);
  showToast('已儲存 ✓');
}

function exportData() {
  const data = {
    exportedAt: new Date().toISOString(),
    settings: loadSettings(),
    records: loadRecords()
  };
  const json = JSON.stringify(data, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `investment_records_${todayStr()}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('已匯出 JSON');
}

function importData() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = evt => {
      try {
        const data = JSON.parse(evt.target.result);
        if (data.records && Array.isArray(data.records)) {
          confirmCallback = () => {
            if (data.settings) saveSettings({ ...DEFAULT_SETTINGS, ...data.settings });
            saveRecords(data.records);
            renderSettings();
            renderHome();
            showToast('匯入成功 ✓');
          };
          document.getElementById('confirm-title').textContent = '確認匯入';
          document.getElementById('confirm-msg').textContent = `將匯入 ${data.records.length} 筆紀錄，現有資料將被覆蓋。`;
          document.getElementById('confirm-ok-btn').textContent = '匯入';
          document.getElementById('confirm-ok-btn').className = 'confirm-btn primary';
          openConfirm();
        } else {
          showToast('JSON 格式錯誤');
        }
      } catch { showToast('檔案解析失敗'); }
    };
    reader.readAsText(file);
  };
  input.click();
}

function clearAllData() {
  confirmCallback = () => {
    localStorage.removeItem(STORAGE_KEY_RECORDS);
    renderHome();
    renderSettings();
    showToast('所有資料已清除');
  };
  document.getElementById('confirm-title').textContent = '清除所有資料';
  document.getElementById('confirm-msg').textContent = '所有紀錄將被永久刪除，此操作無法復原。';
  document.getElementById('confirm-ok-btn').textContent = '清除';
  document.getElementById('confirm-ok-btn').className = 'confirm-btn destructive';
  openConfirm();
}

  alert(`使用說明

2. 輸入台積電與0050的收盤價，股數可套用預設

顏色說明：
🔴 紅色 = 漲（台灣習慣）

}

/* =====================================================================
   MODAL HELPERS
   ===================================================================== */

function openModal(id) {
  document.getElementById(id).classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(id) {
  document.getElementById(id).classList.remove('open');
  document.body.style.overflow = '';
}

/* =====================================================================
   TOAST
   ===================================================================== */

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
}

/* =====================================================================
   INIT
   ===================================================================== */

document.addEventListener('DOMContentLoaded', () => {
  // 版本標記：若版本不符則強制清除舊資料
  const DATA_VERSION = 'v2';
  if (localStorage.getItem('inv_version') !== DATA_VERSION) {
    localStorage.removeItem(STORAGE_KEY_RECORDS);
    localStorage.removeItem(STORAGE_KEY_SETTINGS);
    localStorage.setItem('inv_version', DATA_VERSION);
  }

  renderHome();

  // Close modals by tapping overlay
  document.getElementById('add-modal').addEventListener('click', e => {
    if (e.target === document.getElementById('add-modal')) closeAddModal();
  });
  document.getElementById('detail-modal').addEventListener('click', e => {
    if (e.target === document.getElementById('detail-modal')) closeDetailModal();
  });

  // Handle resize for charts
  window.addEventListener('resize', () => {
    if (currentTab === 'home') renderHome();
    if (currentTab === 'charts') renderCharts();
  });
});
