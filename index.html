<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="投資紀錄">
<meta name="theme-color" content="#f2f2f7">
<title>投資紀錄</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">
  <!-- Page Container -->
  <div class="page-container">

    <!-- ========== HOME PAGE ========== -->
    <div class="page active" id="page-home">
      <div class="nav-bar">
        <div class="nav-bar-inner">
          <span></span>
          <span class="nav-title" style="opacity:0">首頁</span>
          <button class="nav-btn icon-btn" onclick="openAddModal()" style="font-size:28px;font-weight:600;">＋</button>
        </div>
      </div>

      <div style="padding-top:8px;">
        <div class="large-title-section">
          <div style="display:flex;align-items:baseline;justify-content:space-between;">
            <div class="large-title">投資紀錄</div>
            <div id="home-recorded-badge"></div>
          </div>
          <div class="large-title-sub" id="home-date-sub"></div>
        </div>




        <!-- 第一區塊：損益摘要 4大卡片 -->
        <div class="section">
          <div class="section-label">資產摘要</div>
          <div class="grid-2" style="gap:10px;">
            <div class="metric-card">
              <div class="metric-label">今日</div>
              <div style="font-size:24px;font-weight:600;letter-spacing:-0.374px;margin-top:6px;" id="val-today">—</div>
            </div>
            <div class="metric-card">
              <div class="metric-label">本週</div>
              <div style="font-size:24px;font-weight:600;letter-spacing:-0.374px;margin-top:6px;" id="val-week">—</div>
            </div>
            <div class="metric-card">
              <div class="metric-label">本月</div>
              <div style="font-size:24px;font-weight:600;letter-spacing:-0.374px;margin-top:6px;" id="val-month">—</div>
            </div>
            <div class="metric-card">
              <div class="metric-label">本年</div>
              <div style="font-size:24px;font-weight:600;letter-spacing:-0.374px;margin-top:6px;" id="val-year">—</div>
            </div>
          </div>
        </div>

        <!-- 第二區塊：總市值 + 個股 -->
        <div class="section">
          <div class="card card-padding" style="margin-bottom:10px;">
            <div class="metric-label" style="margin-bottom:6px;">總市值</div>
            <div class="metric-value neutral" id="home-total-value">—</div>
            <div id="home-profit-badge" style="margin-top:6px;"></div>
          </div>
          <div style="display:flex;flex-direction:column;gap:10px;">
            <div class="stock-card" id="stock-tsmc"></div>
            <div class="stock-card" id="stock-0050"></div>
          </div>
        </div>

        <!-- Empty state -->
        <div id="home-empty" style="display:none;">
          <div class="empty-state">
            <div class="empty-icon">📈</div>
            <div class="empty-title">尚無投資紀錄</div>
            <div class="empty-subtitle">點右上角「＋」新增<br>第一筆紀錄</div>
          </div>
        </div>
      </div>
    </div>

    <!-- ========== HISTORY PAGE ========== -->
    <div class="page" id="page-history">
      <div class="nav-bar">
        <div class="nav-bar-inner">
          <span></span>
          <span class="nav-title">歷史紀錄</span>
          <span></span>
        </div>
      </div>

      <div class="page-content-start">
        <div style="padding:0 16px 12px;">
          <div class="segmented-control" id="history-seg">
            <button class="seg-btn active" data-period="day" onclick="setHistoryPeriod('day')">日</button>
            <button class="seg-btn" data-period="week" onclick="setHistoryPeriod('week')">週</button>
            <button class="seg-btn" data-period="month" onclick="setHistoryPeriod('month')">月</button>
            <button class="seg-btn" data-period="year" onclick="setHistoryPeriod('year')">年</button>
          </div>
        </div>

        <div id="history-list-wrapper" class="section">
        </div>
      </div>
    </div>

    <!-- ========== CHARTS PAGE ========== -->
    <div class="page" id="page-charts">
      <div class="nav-bar">
        <div class="nav-bar-inner">
          <span></span>
          <span class="nav-title">圖表</span>
          <span></span>
        </div>
      </div>

      <div class="page-content-start">
        <div style="padding:0 16px 12px;">
          <div class="segmented-control" id="chart-range-seg">
            <button class="seg-btn active" data-range="7" onclick="setChartRange(7)">7天</button>
            <button class="seg-btn" data-range="30" onclick="setChartRange(30)">30天</button>
            <button class="seg-btn" data-range="365" onclick="setChartRange(365)">12月</button>
            <button class="seg-btn" data-range="0" onclick="setChartRange(0)">全部</button>
          </div>
        </div>

        <div class="section">
          <div class="chart-container">
            <div class="chart-title">累積損益走勢</div>
            <div class="chart-canvas-wrapper" style="height:180px;">
              <canvas id="chart-profit-main"></canvas>
            </div>
            <div class="chart-stats-row" id="chart-profit-stats"></div>
          </div>
        </div>

        <div class="section" style="padding-bottom:8px;">
          <div class="chart-container">
            <div class="chart-title">總市值走勢</div>
            <div class="chart-canvas-wrapper" style="height:180px;">
              <canvas id="chart-value-main"></canvas>
            </div>
            <div class="chart-stats-row" id="chart-value-stats"></div>
          </div>
        </div>

        <div id="charts-empty" style="display:none;">
          <div class="empty-state">
            <div class="empty-icon">📊</div>
            <div class="empty-title">資料不足</div>
            <div class="empty-subtitle">請至少新增兩筆紀錄<br>才能顯示走勢圖</div>
          </div>
        </div>
      </div>
    </div>

    <!-- ========== SETTINGS PAGE ========== -->
    <div class="page" id="page-settings">
      <div class="nav-bar">
        <div class="nav-bar-inner">
          <span></span>
          <span class="nav-title">設定</span>
          <span></span>
        </div>
      </div>

      <div class="page-content-start">
        <div id="settings-content"></div>
      </div>
    </div>

  </div><!-- end page-container -->

  <!-- ========== TAB BAR ========== -->
  <div class="tab-bar">
    <button class="tab-item active" onclick="switchTab('home')" id="tab-home">
      <span class="tab-icon"><svg xmlns="http://www.w3.org/2000/svg" enable-background="new 0 0 24 24" height="24px" viewBox="0 0 24 24" width="24px" fill="currentColor"><g><rect fill="none" height="24" width="24"/></g><g><path d="M12,2C6.48,2,2,6.48,2,12s4.48,10,10,10s10-4.48,10-10S17.52,2,12,2z M12.88,17.76V19h-1.75v-1.29 c-0.74-0.18-2.39-0.77-3.02-2.96l1.65-0.67c0.06,0.22,0.58,2.09,2.4,2.09c0.93,0,1.98-0.48,1.98-1.61c0-0.96-0.7-1.46-2.28-2.03 c-1.1-0.39-3.35-1.03-3.35-3.31c0-0.1,0.01-2.4,2.62-2.96V5h1.75v1.24c1.84,0.32,2.51,1.79,2.66,2.23l-1.58,0.67 c-0.11-0.35-0.59-1.34-1.9-1.34c-0.7,0-1.81,0.37-1.81,1.39c0,0.95,0.86,1.31,2.64,1.9c2.4,0.83,3.01,2.05,3.01,3.45 C15.9,17.17,13.4,17.67,12.88,17.76z"/></g></svg></span>
      <span class="tab-label">首頁</span>
    </button>
    <button class="tab-item" onclick="switchTab('history')" id="tab-history">
      <span class="tab-icon"><svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 0 24 24" width="24px" fill="currentColor"><path d="M0 0h24v24H0z" fill="none"/><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg></span>
      <span class="tab-label">歷史</span>
    </button>
    <button class="tab-item" onclick="switchTab('charts')" id="tab-charts">
      <span class="tab-icon"><svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 0 24 24" width="24px" fill="currentColor"><path d="M0 0h24v24H0z" fill="none"/><path d="M0 0h24v24H0zm0 0h24v24H0zm21 19c0 1.1-.9 2-2 2H5c-1.1 0-2-.9-2-2V5c0-1.1.9-2 2-2h14c1.1 0 2 .9 2 2" fill="none"/><path d="M21 5v6.59l-3-3.01-4 4.01-4-4-4 4-3-3.01V5c0-1.1.9-2 2-2h14c1.1 0 2 .9 2 2zm-3 6.42l3 3.01V19c0 1.1-.9 2-2 2H5c-1.1 0-2-.9-2-2v-6.58l3 2.99 4-4 4 4 4-3.99z"/></svg></span>
      <span class="tab-label">圖表</span>
    </button>
    <button class="tab-item" onclick="switchTab('settings')" id="tab-settings">
      <span class="tab-icon"><svg xmlns="http://www.w3.org/2000/svg" enable-background="new 0 0 24 24" height="24px" viewBox="0 0 24 24" width="24px" fill="currentColor"><g><path d="M0,0h24v24H0V0z" fill="none"/><path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.07-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.74,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.07,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.44-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.47-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/></g></svg></span>
      <span class="tab-label">設定</span>
    </button>
  </div>
</div><!-- end app -->

<!-- ========== ADD/EDIT MODAL ========== -->
<div class="modal-overlay" id="add-modal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-nav">
      <button class="nav-btn" onclick="closeAddModal()">取消</button>
      <span class="modal-title" id="modal-title">新增紀錄</span>
      <button class="nav-btn" style="font-weight:600;justify-content:flex-end;" onclick="saveRecord()">儲存</button>
    </div>

    <div id="modal-body">
      <!-- Injected by JS -->
    </div>
  </div>
</div>

<!-- ========== DETAIL SHEET ========== -->
<div class="modal-overlay" id="detail-modal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-nav">
      <button class="nav-btn" style="font-size:13px;font-weight:400;" onclick="closeDetailModal()">關閉</button>
      <span class="modal-title">紀錄詳情</span>
      <button class="nav-btn" style="font-size:13px;font-weight:400;justify-content:flex-end;color:var(--blue);" onclick="editFromDetail()">編輯</button>
    </div>
    <div id="detail-body"></div>
  </div>
</div>

<!-- ========== CONFIRM DIALOG ========== -->
<div class="confirm-overlay" id="confirm-overlay">
  <div class="confirm-dialog">
    <div class="confirm-header">
      <div class="confirm-title" id="confirm-title">確認刪除</div>
      <div class="confirm-msg" id="confirm-msg">此操作無法復原。</div>
    </div>
    <div class="confirm-actions">
      <button class="confirm-btn" onclick="confirmCancel()">取消</button>
      <button class="confirm-btn destructive" id="confirm-ok-btn" onclick="confirmOk()">刪除</button>
    </div>
  </div>
</div>

<!-- ========== TOAST ========== -->
<div class="toast" id="toast"></div>


<script src="app.js"></script>
</body>
</html>
